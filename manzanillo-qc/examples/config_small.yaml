# Manzanillo seismic sensor placement — small example config
#
# 8 candidate sites derived from the USGS earthquake catalog (2005–2025, M≥2.0)
# over the 18–20°N / 100–105°W study region near Manzanillo, Colima, Mexico.
#
# Risk weights are energy-weighted seismicity density normalised to [0, 1]:
#   score_i = Σ_{events in cell i} 10^(1.5·M)  →  divided by max score
#
# CAPEX tiers (in $10 K units):
#   10 → $100 K broadband seismometer (risk_norm ≥ 0.60)
#    7 → $70 K  short-period           (0.30 ≤ risk_norm < 0.60)
#    4 → $40 K  MEMS node              (risk_norm < 0.30)

budget_10k: 25        # $250 K total deployment budget
p_layers:    2        # QAOA circuit depth
n_steps:   200        # Adam optimiser iterations
stepsize:  0.01       # Adam learning rate
backend: "default.qubit"

sites:
  - name: "Loc-1 (18.25°N,-102.50°W)"
    lat:  18.25
    lon: -102.50
    risk_weight: 1.0000   # dominant cell — contains the 2003-style Manzanillo thrust zone
    capex_10k: 10
    sensor_type: "Broadband"
    greenfield: false     # XF/ZA network stations already nearby

  - name: "Loc-2 (18.75°N,-101.50°W)"
    lat:  18.75
    lon: -101.50
    risk_weight: 0.0086
    capex_10k: 4
    sensor_type: "MEMS"
    greenfield: true

  - name: "Loc-3 (18.25°N,-100.50°W)"
    lat:  18.25
    lon: -100.50
    risk_weight: 0.0073
    capex_10k: 4
    sensor_type: "MEMS"
    greenfield: true

  - name: "Loc-4 (18.75°N,-104.50°W)"
    lat:  18.75
    lon: -104.50
    risk_weight: 0.0042
    capex_10k: 4
    sensor_type: "MEMS"
    greenfield: true

  - name: "Loc-5 (18.25°N,-103.50°W)"
    lat:  18.25
    lon: -103.50
    risk_weight: 0.0035
    capex_10k: 4
    sensor_type: "MEMS"
    greenfield: false

  - name: "Loc-6 (19.25°N,-100.50°W)"
    lat:  19.25
    lon: -100.50
    risk_weight: 0.0000
    capex_10k: 4
    sensor_type: "MEMS"
    greenfield: true

  - name: "Loc-7 (19.75°N,-104.50°W)"
    lat:  19.75
    lon: -104.50
    risk_weight: 0.0000
    capex_10k: 4
    sensor_type: "MEMS"
    greenfield: false

  - name: "Loc-8 (19.25°N,-101.50°W)"
    lat:  19.25
    lon: -101.50
    risk_weight: 0.0000
    capex_10k: 4
    sensor_type: "MEMS"
    greenfield: true
